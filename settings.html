<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MedControl Settings</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>
<body style="font-family:sans-serif;max-width:900px;margin:40px auto;line-height:1.5;">

<h1>Settings</h1>

<p id="status">Loading...</p>

<hr>

<h3>Account</h3>
<div id="accountEmail">Email: ...</div>
<div id="accountRole">Role: ...</div>

<hr>

<h3>Region & Preferences</h3>

<div style="margin-bottom:12px;">
  <label for="country">Country</label><br>
  <select id="country"></select>
</div>

<div style="margin-bottom:12px;">
  <label for="language">Language</label><br>
  <select id="language"></select>
</div>

<div style="margin-bottom:12px;">
  <label for="timezone">Timezone</label><br>
  <select id="timezone"></select>
</div>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:16px;">
  <button id="saveBtn">Save Settings</button>
  <a href="/app.html"><button type="button">Back to App</button></a>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://lewdbjjaohqxbirzhrbm.supabase.co",
  "sb_publishable_AKV7EBBgChuoMpGJlwxwig_OYo4bzKZ"
);

const statusEl = document.getElementById("status");
const accountEmailEl = document.getElementById("accountEmail");
const accountRoleEl = document.getElementById("accountRole");
const countryEl = document.getElementById("country");
const languageEl = document.getElementById("language");
const timezoneEl = document.getElementById("timezone");
const saveBtn = document.getElementById("saveBtn");

const COUNTRY_CONFIG = {
  Armenia: {
    language: "hy",
    timezones: ["Asia/Yerevan"]
  },
  Germany: {
    language: "de",
    timezones: ["Europe/Berlin"]
  },
  Russia: {
    language: "ru",
    timezones: ["Europe/Moscow", "Asia/Yekaterinburg", "Asia/Novosibirsk", "Asia/Vladivostok"]
  },
  USA: {
    language: "en",
    timezones: ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles"]
  },
  France: {
    language: "fr",
    timezones: ["Europe/Paris"]
  },
  United_Kingdom: {
    language: "en",
    timezones: ["Europe/London"]
  },
  China: {
    language: "zh",
    timezones: ["Asia/Shanghai"]
  },
  Japan: {
    language: "ja",
    timezones: ["Asia/Tokyo"]
  }
};

const LANGUAGE_LABELS = {
  en: "English",
  ru: "Русский",
  de: "Deutsch",
  fr: "Français",
  hy: "Հայերեն",
  zh: "中文",
  ja: "日本語"
};

function detectTimezone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
  } catch {
    return "";
  }
}

function detectLanguageCode() {
  const lang = (navigator.language || "en").slice(0, 2).toLowerCase();
  return LANGUAGE_LABELS[lang] ? lang : "en";
}

function fillCountries() {
  countryEl.innerHTML = "";
  Object.keys(COUNTRY_CONFIG).forEach((country) => {
    const opt = document.createElement("option");
    opt.value = country;
    opt.textContent = country.replaceAll("_", " ");
    countryEl.appendChild(opt);
  });
}

function fillLanguages(selectedCode = "en") {
  languageEl.innerHTML = "";
  Object.entries(LANGUAGE_LABELS).forEach(([code, label]) => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = label;
    if (code === selectedCode) opt.selected = true;
    languageEl.appendChild(opt);
  });
}

function fillTimezones(countryKey, selectedTimezone = "") {
  timezoneEl.innerHTML = "";
  const list = COUNTRY_CONFIG[countryKey]?.timezones || [];
  list.forEach((tz) => {
    const opt = document.createElement("option");
    opt.value = tz;
    opt.textContent = tz;
    if (tz === selectedTimezone) opt.selected = true;
    timezoneEl.appendChild(opt);
  });
  if (selectedTimezone && !list.includes(selectedTimezone)) {
    const opt = document.createElement("option");
    opt.value = selectedTimezone;
    opt.textContent = selectedTimezone;
    opt.selected = true;
    timezoneEl.appendChild(opt);
  }
}

function findCountryByTimezone(tz) {
  for (const [country, cfg] of Object.entries(COUNTRY_CONFIG)) {
    if ((cfg.timezones || []).includes(tz)) return country;
  }
  return "Germany";
}

countryEl.onchange = () => {
  const country = countryEl.value;
  const cfg = COUNTRY_CONFIG[country];
  fillLanguages(cfg.language);
  fillTimezones(country, cfg.timezones[0] || "");
};

saveBtn.onclick = async () => {
  saveBtn.disabled = true;
  statusEl.textContent = "Saving...";

  const { data: sessionData } = await supabase.auth.getSession();
  const userId = sessionData?.session?.user?.id;

  if (!userId) {
    statusEl.textContent = "No session";
    saveBtn.disabled = false;
    return;
  }

  const payload = {
    country: countryEl.value,
    ui_lang: languageEl.value,
    timezone: timezoneEl.value
  };

  const { error } = await supabase
    .from("profiles")
    .update(payload)
    .eq("id", userId);

  if (error) {
    statusEl.textContent = "Save error: " + error.message;
    saveBtn.disabled = false;
    return;
  }

  localStorage.setItem("mc_ui_lang", languageEl.value);
  statusEl.textContent = "Settings saved";
  saveBtn.disabled = false;
};

async function init() {
  const { data: sessionData } = await supabase.auth.getSession();

  if (!sessionData?.session) {
    window.location.replace("/auth-login.html");
    return;
  }

  const userId = sessionData.session.user.id;

  const { data: profile, error } = await supabase
    .from("profiles")
    .select("email, role, timezone, ui_lang, country")
    .eq("id", userId)
    .single();

  if (error) {
    statusEl.textContent = "Profile error: " + error.message;
    return;
  }

  accountEmailEl.textContent = "Email: " + (profile?.email || "");
  accountRoleEl.textContent = "Role: " + (profile?.role || "");

  fillCountries();

  const tz = (profile?.timezone || "").trim() || detectTimezone();
  const lang = (profile?.ui_lang || "").trim() || detectLanguageCode();
  const country = (profile?.country || "").trim() || findCountryByTimezone(tz);

  countryEl.value = COUNTRY_CONFIG[country] ? country : "Germany";
  fillLanguages(lang);
  fillTimezones(countryEl.value, tz);

  statusEl.textContent = "Ready";
}

await init();
</script>

</body>
</html>
