<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Affixo MedControl — Login</title>
</head>
<body style="font-family:sans-serif;max-width:600px;margin:60px auto;">

<h2>Affixo MedControl — Login</h2>

<p>Enter email and send magic link.</p>

<input id="email" placeholder="Email" style="width:260px;">
<button id="send">Send magic link</button>

<pre id="debug" style="margin-top:20px;color:#555; display:none;"></pre>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://lewdbjjaohqxbirzhrbm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_AKV7EBBgChuoMpGJlwxwig_OYo4bzKZ";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const debugEl = document.getElementById("debug");
const url = new URL(window.location.href);
const DEBUG = url.searchParams.get("debug") === "1";

function showDebug(obj) {
  if (!DEBUG) return;
  debugEl.style.display = "block";
  debugEl.textContent = JSON.stringify(obj, null, 2);
}

async function goApp() {
  // IMPORTANT: never use localhost in production
  window.location.replace("/app.html");
}

/* ---------------- HANDLE MAGIC LINK CALLBACK ----------------
   Supabase может вернуть:
   - ?code=...   (PKCE flow)
   - #access_token=... (implicit/legacy)
   Мы поддерживаем оба.
-------------------------------------------------------------- */

(async () => {
  try {
    const hasCode = url.searchParams.has("code");
    const hasAccessToken = window.location.hash.includes("access_token");

    showDebug({
      href: window.location.href,
      hash: window.location.hash,
      hasCode,
      hasAccessToken
    });

    // 1) Если пришёл code=... — обменяем на session
    if (hasCode) {
      const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
      if (error) {
        alert("Auth code exchange error: " + error.message);
      } else {
        // Чистим URL от code=... чтобы не мешал при обновлении
        const clean = new URL(window.location.href);
        clean.searchParams.delete("code");
        clean.searchParams.delete("state");
        clean.hash = "";
        window.history.replaceState({}, document.title, clean.pathname + clean.search);
      }
    }

    // 2) Проверяем сессию (после code-exchange или если она уже есть)
    const { data: sessionData, error: sessErr } = await supabase.auth.getSession();
    if (sessErr) console.warn("getSession error:", sessErr);

    if (sessionData?.session) {
      await goApp();
      return;
    }

    // 3) Если у нас hash access_token — supabase обычно сам подхватит,
    // но на всякий случай просто подождём onAuthStateChange
    if (hasAccessToken) {
      // попытка повторно получить сессию после возможной обработки токена
      const { data: s2 } = await supabase.auth.getSession();
      if (s2?.session) {
        await goApp();
        return;
      }
    }

  } catch (e) {
    console.error(e);
  }
})();

/* ---------------- SEND LINK ---------------- */

document.getElementById("send").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  if (!email) return alert("Enter email");

  // Redirect обратно на ЭТОТ домен, а не localhost
  const redirectTo = `${window.location.origin}/auth-login.html`;

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: redirectTo
    }
  });

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Magic link sent. Open your email on the SAME device/browser.");
  }
};

/* ---------------- AFTER MAGIC LINK (SESSION EVENT) ---------------- */

supabase.auth.onAuthStateChange((event, session) => {
  showDebug({ event, hasSession: !!session });
  if (session) {
    goApp();
  }
});
</script>

</body>
</html>
