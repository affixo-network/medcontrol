<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Affixo MedControl</title>
</head>

<body style="font-family:sans-serif;max-width:900px;margin:40px auto;">

<h2>Affixo MedControl — App</h2>

<p id="status">Loading...</p>

<div style="margin-bottom:12px;">
<button id="logout">Logout</button>
<button id="whoami">WhoAmI</button>
</div>

<hr>

<div id="patients-section">
<h3>People</h3>
<p id="selected">(none)</p>
<ul id="patients"></ul>
<pre id="err" style="white-space:pre-wrap;color:#b00;"></pre>
</div>

<hr>

<div id="team-box" style="display:none;margin:12px 0;padding:10px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;">
<h3>Team</h3>

<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
<input id="team-email" placeholder="Team member email">
<button id="add-team-member">Add Team Member</button>
</div>

<p id="team-email-status"></p>
<p id="team-members-list"></p>
</div>

<h3>Medications</h3>
<ul id="meds"></ul>

<h3>Today</h3>
<div id="today-list"></div>

<h3>History</h3>
<div id="history-list"></div>

<hr>

<div id="addmed-section">
<h3>Add Medication</h3>

<div style="display:flex;gap:8px;flex-wrap:wrap;">
<input id="medName" placeholder="Name">
<input id="medDose" placeholder="Dose">
<input id="medScheduleLegacy" placeholder="Schedule">
<button id="addMed">Add</button>
</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
"https://lewdbjjaohqxbirzhrbm.supabase.co",
"sb_publishable_AKV7EBBgChuoMpGJlwxwig_OYo4bzKZ"
)

const statusEl=document.getElementById("status")
const patientsEl=document.getElementById("patients")
const selectedEl=document.getElementById("selected")
const errEl=document.getElementById("err")

const medsEl=document.getElementById("meds")
const todayEl=document.getElementById("today-list")
const historyEl=document.getElementById("history-list")

const teamBoxEl=document.getElementById("team-box")
const teamEmailEl=document.getElementById("team-email")
const teamEmailStatusEl=document.getElementById("team-email-status")
const teamMembersListEl=document.getElementById("team-members-list")

const addMedSectionEl=document.getElementById("addmed-section")

let selectedPatientId=null
let role="unknown"
let cachedPatients=[]

function fmtTimeHHMM(t){
if(!t)return"09:00"
return String(t).slice(0,5)
}

function makeTodaySlotIso(t){
const [h,m]=t.split(":").map(x=>parseInt(x))
const d=new Date()
d.setHours(h||9,m||0,0,0)
return d.toISOString()
}

async function fetchPatients(){

const{data,error}=await supabase
.from("patients")
.select("id,display_name,monitoring_mode,created_at")
.order("created_at",{ascending:false})

if(error){
errEl.textContent=error.message
return[]
}

return data||[]

}

async function renderPatientsList(list){

patientsEl.innerHTML=""

if(list.length===0){
patientsEl.innerHTML="<li>(no patients)</li>"
return
}

list.forEach(p=>{

const li=document.createElement("li")

li.textContent=p.display_name+" — "+(p.monitoring_mode||"standard")

li.style.cursor="pointer"
li.style.padding="6px"
li.style.border="1px solid #ddd"
li.style.margin="6px 0"
li.style.borderRadius="6px"

li.onclick=()=>{
selectPatient(p.id,p.display_name,p.monitoring_mode)
}

patientsEl.appendChild(li)

})

}

async function loadTeamMembers(){

if(!selectedPatientId)return

const{data,error}=await supabase
.from("patient_partners")
.select("partner_email")
.eq("patient_id",selectedPatientId)

if(error){
teamMembersListEl.textContent="error"
return
}

teamMembersListEl.textContent=
"Team members: "+data.map(x=>x.partner_email).join(", ")

}

async function loadMeds(){

if(!selectedPatientId)return

const{data,error}=await supabase
.from("medications")
.select("id,name,dose")
.eq("patient_id",selectedPatientId)

if(error){
medsEl.innerHTML="<li>"+error.message+"</li>"
return
}

medsEl.innerHTML=""

data.forEach(m=>{
const li=document.createElement("li")
li.textContent=m.name+" — "+(m.dose||"")
medsEl.appendChild(li)
})

}

async function mark(medId,status,slot){

const iso=makeTodaySlotIso(slot)

await supabase.rpc("log_med_intake",{
_patient_id:selectedPatientId,
_medication_id:medId,
_scheduled_at:iso,
_status:status
})

loadToday()
loadHistory()

}

async function loadToday(){

if(!selectedPatientId)return

todayEl.innerHTML=""

const{data:meds}=await supabase
.from("medications")
.select("id,name,dose")
.eq("patient_id",selectedPatientId)

if(!meds)return

const medIds=meds.map(m=>m.id)

const{data:times}=await supabase
.from("medication_times")
.select("medication_id,time_of_day")
.in("medication_id",medIds)

const map=new Map()

times.forEach(t=>{
const arr=map.get(t.medication_id)||[]
arr.push(fmtTimeHHMM(t.time_of_day))
map.set(t.medication_id,arr)
})

const{data:logs}=await supabase
.from("medication_logs")
.select("medication_id,scheduled_at,status")
.eq("patient_id",selectedPatientId)

meds.forEach(m=>{

const box=document.createElement("div")
box.innerHTML="<b>"+m.name+"</b> — "+(m.dose||"")

const slots=map.get(m.id)||[]

slots.forEach(slot=>{

const row=document.createElement("div")

const iso=makeTodaySlotIso(slot)
const log=logs.find(l=>l.scheduled_at===iso)

row.innerHTML=slot+" — <b>"+(log?log.status:"not marked")+"</b>"

const b1=document.createElement("button")
b1.textContent="Taken"
b1.onclick=()=>mark(m.id,"taken",slot)

const b2=document.createElement("button")
b2.textContent="Missed"
b2.onclick=()=>mark(m.id,"missed",slot)

row.appendChild(b1)
row.appendChild(b2)

box.appendChild(row)

})

todayEl.appendChild(box)

})

}

async function loadHistory(){

const{data}=await supabase
.from("medication_logs")
.select("status,scheduled_at,recorded_role")
.eq("patient_id",selectedPatientId)
.order("scheduled_at",{ascending:false})
.limit(50)

historyEl.innerHTML=""

data.forEach(r=>{

const d=document.createElement("div")
d.textContent=r.status+" "+r.scheduled_at+" — "+r.recorded_role
historyEl.appendChild(d)

})

}

async function selectPatient(id,name,mode){

selectedPatientId=id

selectedEl.innerHTML=name

teamBoxEl.style.display=mode==="team"?"block":"none"

loadMeds()
loadToday()
loadHistory()
loadTeamMembers()

}

document.getElementById("add-team-member").onclick=async()=>{

const email=teamEmailEl.value.trim()

if(!email)return

await supabase
.from("patient_partners")
.upsert({patient_id:selectedPatientId,partner_email:email})

teamEmailEl.value=""
teamEmailStatusEl.textContent="added"

loadTeamMembers()

}

document.getElementById("addMed").onclick=async()=>{

if(role!=="admin")return

const name=document.getElementById("medName").value
const dose=document.getElementById("medDose").value
const schedule=document.getElementById("medScheduleLegacy").value

await supabase.from("medications").insert({
patient_id:selectedPatientId,
name,
dose,
schedule
})

loadMeds()
loadToday()

}

document.getElementById("logout").onclick=async()=>{
await supabase.auth.signOut()
location.href="/auth-login.html"
}

document.getElementById("whoami").onclick=async()=>{
const{data}=await supabase.rpc("debug_whoami")
alert(JSON.stringify(data))
}

async function init(){

const{data:session}=await supabase.auth.getSession()

if(!session.session){
location.href="/auth-login.html"
return
}

const{data:profile}=await supabase
.from("profiles")
.select("email,role")
.maybeSingle()

role=profile.role

statusEl.textContent="Logged in as "+profile.email+" ("+role+")"

if(role!=="admin")addMedSectionEl.style.display="none"

cachedPatients=await fetchPatients()

renderPatientsList(cachedPatients)

if(cachedPatients.length){
const p=cachedPatients[0]
selectPatient(p.id,p.display_name,p.monitoring_mode)
}

}

init()

</script>

</body>
</html>
