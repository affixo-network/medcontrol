<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Affixo MedControl</title>
</head>

<body style="font-family:sans-serif;max-width:900px;margin:40px auto;">

<h2>Affixo MedControl — App</h2>

<p id="status">Loading...</p>

<button id="logout">Logout</button>
<hr>

<h3>People</h3>
<p id="selected">(none)</p>
<ul id="patients"></ul>

<hr>

<div id="team-box" style="display:none;border:1px solid #ccc;padding:10px;border-radius:6px;margin-bottom:10px;">
<h3>Team</h3>

<input id="team-email" placeholder="Team member email">
<button id="add-team-member">Add Team Member</button>

<p id="team-email-status"></p>
<p id="team-members-list"></p>

</div>

<h3>Medications</h3>
<ul id="meds"></ul>

<h3>Today</h3>
<div id="today-list"></div>

<h3>History</h3>
<div id="history-list"></div>

<hr>

<h3>Add Medication</h3>

<input id="medName" placeholder="Name">
<input id="medDose" placeholder="Dose">
<input id="medScheduleLegacy" placeholder="Schedule">
<button id="addMed">Add</button>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://lewdbjjaohqxbirzhrbm.supabase.co",
"sb_publishable_AKV7EBBgChuoMpGJlwxwig_OYo4bzKZ"
);

const statusEl=document.getElementById("status");
const patientsEl=document.getElementById("patients");
const selectedEl=document.getElementById("selected");

const teamBoxEl=document.getElementById("team-box");
const teamEmailEl=document.getElementById("team-email");
const teamEmailStatusEl=document.getElementById("team-email-status");
const teamMembersListEl=document.getElementById("team-members-list");

const medsEl=document.getElementById("meds");
const todayEl=document.getElementById("today-list");
const historyEl=document.getElementById("history-list");

let selectedPatientId=null;
let cachedPatients=[];
let selectedMonitoringMode="standard";

function updateModeUI(mode){

if(mode==="team"){
teamBoxEl.style.display="block";
}
else{
teamBoxEl.style.display="none";
}

}

const {data:sessionData}=await supabase.auth.getSession();

if(!sessionData?.session){
window.location.replace("/auth-login.html");
throw new Error("No session");
}

const {data:profile}=await supabase
.from("profiles")
.select("email,role")
.maybeSingle();

statusEl.textContent=`Logged in as ${profile.email} (${profile.role})`;

async function fetchPatients(){

const {data,error}=await supabase
.from("patients")
.select("id,display_name,monitoring_mode,created_at")
.order("created_at",{ascending:false});

if(error){
alert(error.message);
return[];
}

return data||[];

}

async function renderPatientsList(patients){

patientsEl.innerHTML="";

patients.forEach(p=>{

const li=document.createElement("li");

li.textContent=p.display_name+" — "+(p.monitoring_mode||"standard");

li.onclick=async()=>{

await selectPatient(
p.id,
p.display_name,
p.monitoring_mode
);

};

patientsEl.appendChild(li);

});

}

async function selectPatient(patientId,displayName,mode="standard"){

selectedPatientId=patientId;
selectedMonitoringMode=mode;

selectedEl.innerHTML=
`${displayName}<br>
Monitoring Mode:
<select id="mode_select">
<option value="standard">Standard</option>
<option value="team">Team</option>
</select>`;

const modeSelect=document.getElementById("mode_select");

modeSelect.value=(mode==="team")?"team":"standard";

modeSelect.onchange=async()=>{

const newMode=modeSelect.value;

const {error}=await supabase
.from("patients")
.update({monitoring_mode:newMode})
.eq("id",patientId);

if(error){
alert(error.message);
return;
}

cachedPatients=cachedPatients.map(p=>
p.id===patientId?{...p,monitoring_mode:newMode}:p
);

await renderPatientsList(cachedPatients);

updateModeUI(newMode);

};

updateModeUI(mode);

await loadMeds();
await loadToday();
await loadHistory();
await loadTeamMembers();

}

async function loadTeamMembers(){

if(!selectedPatientId){
teamMembersListEl.textContent="";
return;
}

const {data,error}=await supabase
.from("patient_partners")
.select("partner_email")
.eq("patient_id",selectedPatientId);

if(error){
teamMembersListEl.textContent=error.message;
return;
}

if(!data||data.length===0){
teamMembersListEl.textContent="No team members";
return;
}

teamMembersListEl.textContent=
"Team members: "+
data.map(x=>x.partner_email).join(", ");

}

document.getElementById("add-team-member").onclick=async()=>{

if(!selectedPatientId){
teamEmailStatusEl.textContent="Select patient first";
return;
}

const email=teamEmailEl.value.trim().toLowerCase();

if(!email){
teamEmailStatusEl.textContent="Enter email";
return;
}

const {error}=await supabase
.from("patient_partners")
.upsert([
{patient_id:selectedPatientId,partner_email:email}
],{onConflict:"patient_id,partner_email"});

if(error){
teamEmailStatusEl.textContent=error.message;
return;
}

await supabase
.from("patient_partner_invites")
.upsert([
{
patient_id:selectedPatientId,
invited_email:email,
status:"pending"
}
],{onConflict:"patient_id,invited_email"});

teamEmailEl.value="";
teamEmailStatusEl.textContent="Team member added";

await loadTeamMembers();

};

async function loadMeds(){

medsEl.innerHTML="";

if(!selectedPatientId)return;

const {data}=await supabase
.from("medications")
.select("*")
.eq("patient_id",selectedPatientId);

data.forEach(m=>{

const li=document.createElement("li");
li.textContent=m.name+" — "+m.dose;
medsEl.appendChild(li);

});

}

async function loadToday(){

todayEl.innerHTML="";

if(!selectedPatientId)return;

const {data}=await supabase
.from("medication_logs")
.select("*")
.eq("patient_id",selectedPatientId);

data.forEach(r=>{

const div=document.createElement("div");
div.textContent=r.status+" "+r.scheduled_at;
todayEl.appendChild(div);

});

}

async function loadHistory(){

historyEl.innerHTML="";

if(!selectedPatientId)return;

const {data}=await supabase
.from("medication_logs")
.select("*")
.eq("patient_id",selectedPatientId)
.order("scheduled_at",{ascending:false})
.limit(50);

data.forEach(r=>{

const div=document.createElement("div");
div.textContent=r.status+" "+r.scheduled_at;
historyEl.appendChild(div);

});

}

document.getElementById("addMed").onclick=async()=>{

const name=document.getElementById("medName").value;
const dose=document.getElementById("medDose").value;
const schedule=document.getElementById("medScheduleLegacy").value;

await supabase.from("medications").insert({
patient_id:selectedPatientId,
name,
dose,
schedule
});

await loadMeds();

};

document.getElementById("logout").onclick=async()=>{
await supabase.auth.signOut();
window.location.replace("/auth-login.html");
};

cachedPatients=await fetchPatients();
await renderPatientsList(cachedPatients);

</script>

</body>
</html>
